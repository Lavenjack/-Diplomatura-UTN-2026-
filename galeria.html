<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/galeria.css" />
    <title>Galería - SisterMKUP</title>
    <script
      src="https://kit.fontawesome.com/361ef98789.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <nav>
        <a class="nav-logo" href="index.html">SistersMKUP</a>
        <ul>
          <li>
            <a href="index.html"
              ><i class="fa-regular fa-house fa-bounce icono"></i
            ></a>
          </li>
          <li>
            <a href="index.html#contacto"
              ><i class="fa-solid fa-phone fa-bounce icono"></i
            ></a>
          </li>
          <li>
            <a href="https://www.instagram.com/sisters.mkp/">
              <i class="fab fa-instagram icono"></i>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="gallery-header">
        <p class="gallery-eyebrow">Nuestros trabajos</p>
        <h2>Galería de Maquillajes</h2>
        <p class="gallery-subtitle">
          Cada rostro es un lienzo, cada maquillaje una obra de arte
        </p>
      </section>

      <section class="gallery-container">
        <div class="gallery">
          <div class="gallery-item">
            <img src="../img/card-galery1.jpg" alt="Maquillaje artístico 1" />
            <div class="gallery-overlay"></div>
          </div>
          <div class="gallery-item">
            <img src="../img/card-galery2.jpg" alt="Maquillaje artístico 2" />
            <div class="gallery-overlay"></div>
          </div>
          <div class="gallery-item">
            <img src="../img/card-galery3.jpg" alt="Maquillaje artístico 3" />
            <div class="gallery-overlay"></div>
          </div>
          <div class="gallery-item">
            <img src="../img/card-galery5.jpg" alt="Maquillaje artístico 4" />
            <div class="gallery-overlay"></div>
          </div>
          <div class="gallery-item">
            <img src="../img/card-galery6.jpg" alt="Maquillaje artístico 5" />
            <div class="gallery-overlay"></div>
          </div>
          <div class="gallery-item">
            <img src="../img/card-galery7.jpg" alt="Maquillaje artístico 6" />
            <div class="gallery-overlay"></div>
          </div>
          <div class="gallery-item">
            <img src="../img/card-galery8.jpg" alt="Maquillaje artístico 7" />
            <div class="gallery-overlay"></div>
          </div>
          <div class="gallery-item">
            <img src="../img/card-galery9.jpg" alt="Maquillaje artístico 8" />
            <div class="gallery-overlay"></div>
          </div>
        </div>
      </section>

      <section class="gallery-cta">
        <p>¿Te gustó lo que viste?</p>
        <a href="index.html#contacto" class="btn-gallery">Contáctanos</a>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 SisterMKUP. Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
